        <!-- <div class="form-cover">  -->
            <div id="form">
                <div class="campos">
                    <div class="campo-input item1">
                        <input id="inputCliente" type="text" value="" placeholder="Nome do cliente">
                        <label>Cliente</label>
                    </div>
                    <div class="campo-input item2">
                        <input id="inputEndereco" type="text" value="" placeholder="Endereço do cliente">
                        <label>Endereço</label>
                    </div>
                    <div class="campo-input item3">
                        <input id="inputProduto" type="text" value="" placeholder="Descrição do produto">
                        <label>Produto</label>
                    </div>
                    <div class="campo-input item4">
                        <input id="inputValor" type="text" oninput="formatarParaMoeda(this)" placeholder="R$ 0,00" value="">
                        <label>Valor Total (R$)</label>
                    </div>
                    <div class="campo-input item5">
                        <input id="inputParcelas" type="number" value="" placeholder="0">
                        <label>Parcelas</label>
                    </div>
                    <div class="campo-input item6">
                        <input id="inputEmissao" type="date" value="">
                        <label>Data de Emissão</label>
                    </div>
                    <div class="campo-input item7">
                        <input id="inputVencimento" type="date" value="">
                        <label>Data de Vencimento</label>
                    </div>
                </div>
                <div class="botoes">
                    <button class="botao" type="submit" onclick="gerarCarne()">GERAR CARNÊ</button>
                    <button class="botao" onclick="resetar()"><i class="material-icons">refresh</i></button>
                    <button class="botao" onclick="window.print()"><i class="material-icons">print</i></button>
                </div>
            </div>
